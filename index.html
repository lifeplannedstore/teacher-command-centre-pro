metable\"] main {\n        display: block !important;\n        height: auto !important;\n        overflow: visible !important;\n      }\n      html[data-print-section=\"timetable\"] .tcp-print-page {\n        display: block !important;\n        height: auto !important;\n        overflow: visible !important;\n        gap: 0 !important;\n      }\n      html[data-print-section=\"timetable\"] .tcp-calendar-print-wrapper {\n        display: block !important;\n        height: auto !important;\n        overflow: visible !important;\n      }\n      html[data-print-section=\"timetable\"] .tcp-weekly-print-page,\n      html[data-print-section=\"timetable\"] .tcp-calendar-print-page { min-height: 175mm; width: 100% !important; }\n      html[data-print-section=\"timetable\"] main > div:not(.tcp-timetable-report-print) { display: none !important; }\n      html[data-print-section=\"timetable\"] .tcp-timetable-report-print {\n        display: block !important;\n        padding: 0 !important;\n        width: 100% !important;\n        color: #111 !important;\n        background: #fff !important;\n      }\n      html[data-print-section=\"timetable\"] .tcp-report-week-page {\n        display: block !important;\n        break-after: auto;\n        page-break-after: auto;\n        height: 188mm;\n        min-height: 188mm;\n        max-height: 188mm;\n        overflow: hidden;\n        box-sizing: border-box;\n      }\n      html[data-print-section=\"timetable\"] .tcp-report-hard-break {\n        display: block !important;\n        height: 0 !important;\n        break-before: page;\n        page-break-before: always;\n      }\n      html[data-print-section=\"timetable\"] .tcp-report-month-page {\n        display: block !important;\n        break-before: auto;\n        page-break-before: auto;\n        min-height: 175mm;\n      }\n      input, textarea, select { border: 1px solid #cfcfcf !important; color: #111 !important; background: #fff !important; }\n      [style*=\"grid-template-col div>\n            </sc-for>\n          </div>\n        </sc-for>\n      </div>\n    </div>\n\n    <!-- CURRICULUM TRACKER -->\n    <div style=\"display:{{ curriculumD }};flex-direction:column;gap:20px;padding:32px;animation:fadeIn 0.3s ease\">\n      <div style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:26px\">Curriculum Tracker</div>\n      <div style=\"display:flex;gap:10px\">\n        <select style=\"padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text-primary);font-size:13px\" value=\"{{ currSubjectFilter }}\" onchange=\"{{ onCurrSubjectFilter }}\">\n          <option value=\"\">All Subjects</option>\n          <option value=\"Science\">Science</option>\n          <option value=\"Biology\">Biology</option>\n          <option value=\"English\">English</option>\n        </select>\n      </div>\n      <!-- Coverage dots -->\n      <div style=\"background:var(--bg-surface);border:1px solid var(--border);border-radius:16px;padding:24px\">\n        <div style=\"font-family:Nunito,sans-serif;font-weight:700;font-size:15px;margin-bottom:16px\">Coverage Overview</div>\n        <div style=\"font-size:12px;color:var(--text-secondary);line-height:1.5;margin-bottom:12px\">Each square is a curriculum outcome. Its colour comes from the outcome status below: assessed, in progress, or not started.</div>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n          <sc-for list=\"{{ currDots }}\" as=\"dot\">\n            <div style=\"width:32px;height:32px;border-radius:8px;background:{{ dot.color }};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white;cursor:default\" title=\"{{ dot.tooltip }}\">{{ dot.code }}</div>\n          </sc-for>\n        </div>\n        <div style=\"display:flex;gap:16px;margin-top:16px;font-size:12px;color:var(--text-secondary)\">\n          <span style=\"display:flex;align-items:center;gap:4px\"><span style=\"width:10px;height:10px;border-radius:3px;background:var(--success)\"></span>Assessed</span>\n          <span style=\"display:flex;align-items:center;gap:4px\"><span style=\"width:10px;height:10px;border-radius:3px;background:var(--warning)\"></span>In progress</span>\n          <span style=\"display:flex;align-items:center;gap:4px\"><span style=\"width:10px;height:10px;border-radius:3px;background:var(--text-muted)\"></span>Not started</span>\n        </div>\n      </div>\n      <!-- Outcomes table -->\n      <div style=\"background:var(--bg-surface);border:1px solid var(--border);border-radius:16px;overflow:hidden\">\n        <div style=\"display:grid;grid-template-columns:100px 2fr 80px 100px;padding:12px 18px;background:var(--bg-raised);font-weight:600;font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border)\">\n          <div>Code</div><div>Descriptor</div><div>Lessons</div><div>Status</div>\n        </div>\n        <sc-for list=\"{{ currRows }}\" as=\"cr\">\n          <div style=\"display:grid;grid-template-columns:100px 2fr 80px 100px;padding:12px 18px;border-bottom:1px solid var(--border);font-size:13px;align-items:center\">\n            <input type=\"text\" value=\"{{ cr.code }}\" oninput=\"{{ cr.onCode }}\" style=\"font-weight:700;font-size:12px;color:var(--accent-dark);padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised)\">\n            <input type=\"text\" value=\"{{ cr.descriptor }}\" oninput=\"{{ cr.onDescriptor }}\" style=\"color:var(--text-secondary);padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised)\">\n            <div style=\"text-align:center;font-weight:600\">{{ cr.linkedLessons }}</div>\n            <select value=\"{{ cr.status }}\" onchange=\"{{ cr.onStatus }}\" style=\"padding:7px;border-radius:8px;border:1px solid var(--border);background:{{ cr.statusBg }};color:{{ cr.statusColor }};font-size:11px;font-weight:700\">\n le=\"padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-primary);font-size:12px;font-weight:600\">\n              <input type=\"text\" value=\"{{ ap.username }}\" oninput=\"{{ ap.onUsername }}\" style=\"padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-primary);font-size:12px\">\n              <input type=\"{{ ap.inputType }}\" value=\"{{ ap.password }}\" oninput=\"{{ ap.onPassword }}\" style=\"padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-primary);font-size:12px;font-family:monospace\">\n              <input type=\"text\" value=\"{{ ap.url }}\" oninput=\"{{ ap.onUrl }}\" style=\"padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-primary);font-size:12px\">\n              <div style=\"display:flex;gap:8px\"><span onclick=\"{{ ap.togglePw }}\" style=\"font-size:12px;font-weight:800;color:var(--accent);cursor:pointer\">{{ ap.toggleLabel }}</span><span onclick=\"{{ ap.remove }}\" style=\"font-size:12px;font-weight:800;color:var(--danger);cursor:pointer\">Delete</span></div>\n            </div>\n          </sc-for>\n        </div>\n      </sc-if>\n      <!-- Handover -->\n      <sc-if value=\"{{ showAdminHandover }}\">\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <sc-for list=\"{{ handoverCards }}\" as=\"hc\">\n            <div style=\"background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px;border-left:4px solid {{ hc.color }}\">\n              <div style=\"font-weight:700;font-size:14px;margin-bottom:8px\">{{ hc.name }}</div>\n              <textarea value=\"{{ hc.notes }}\" oninput=\"{{ hc.onNotes }}\" style=\"width:100%;height:80px;border:1px solid var(--border);border-radius:8px;padding:10px;background:var(--bg-raised);color:var(--text-primary);font-size:13px;line-height:1.5\"></textarea>\n            </div>\n          </sc-for>\n        </div>\n      </sc-if>\n      <!-- Safety -->\n      <sc-if value=\"{{ showAdminSafety }}\">\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <sc-for list=\"{{ safetyCards }}\" as=\"sc\">\n            <div style=\"display:grid;grid-template-columns:180px 1fr auto;gap:10px;background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:16px;align-items:start\">\n              <label style=\"display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--text-muted);font-weight:800;text-transform:uppercase\">Type\n                <input type=\"text\" value=\"{{ sc.type }}\" oninput=\"{{ sc.onType }}\" style=\"padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-primary);font-size:12px;text-transform:none;font-weight:500\">\n              </label>\n              <label style=\"display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--text-muted);font-weight:800;text-transform:uppercase\">Notes\n                <textarea value=\"{{ sc.notes }}\" oninput=\"{{ sc.onNotes }}\" style=\"height:76px;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-primary);font-size:12px;line-height:1.45;text-transform:none;font-weight:500\"></textarea>\n              </label>\n              <div onclick=\"{{ sc.remove }}\" style=\"color:var(--danger);font-size:12px;font-weight:800;cursor:pointer;padding-top:24px\">Delete</div>\n            </div>\n          </sc-for>\n        </div>\n      </sc-if>\n      <!-- Budget -->\n      <sc-if value=\"{{ showAdminBudget }}\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px\">\n          <div style=\"grid-column:1 / -1;padding:16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;gap:12px\">\n olid var(--border);background:var(--bg-surface);color:var(--text-primary);font-size:13px\" value=\"{{ resourceTypeFilter }}\" onchange=\"{{ onResourceTypeFilter }}\">\n          <option value=\"\">All Types</option>\n          <option value=\"Website\">Website</option>\n          <option value=\"PDF\">PDF</option>\n          <option value=\"Video\">Video</option>\n          <option value=\"Article\">Article</option>\n          <option value=\"Template\">Template</option>\n        </select>\n      </div>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px\">\n        <sc-for list=\"{{ filteredResources }}\" as=\"res\">\n          <div style=\"background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n              <div style=\"font-weight:700;font-size:14px\">{{ res.title }}</div>\n              <div onclick=\"{{ res.toggleStar }}\" style=\"cursor:pointer;font-size:16px\">{{ res.starIcon }}</div>\n            </div>\n            <div style=\"font-size:12px;color:var(--accent)\">{{ res.url }}</div>\n            <div style=\"font-size:12px;color:var(--text-secondary);line-height:1.5\">{{ res.notes }}</div>\n            <div style=\"display:flex;gap:4px;flex-wrap:wrap;margin-top:auto\">\n              <sc-for list=\"{{ res.tagEls }}\" as=\"tg\">\n                <span style=\"padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--accent2-light);color:var(--accent2)\">{{ tg }}</span>\n              </sc-for>\n              <span style=\"padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--bg-raised);color:var(--text-muted)\">{{ res.type }}</span>\n            </div>\n            <div style=\"display:flex;gap:8px;margin-top:8px\">\n              <div onclick=\"{{ res.edit }}\" style=\"font-size:12px;font-weight:800;color:var(--accent);cursor:pointer\">Edit</div>\n              <div onclick=\"{{ res.remove }}\" style=\"font-size:12px;font-weight:800;color:var(--danger);cursor:pointer\">Delete</div>\n            </div>\n          </div>\n        </sc-for>\n      </div>\n    </div>\n\n    <!-- PROFESSIONAL DEVELOPMENT -->\n    <div class=\"tcp-print-page\" style=\"display:{{ pdD }};flex-direction:column;gap:20px;padding:32px;animation:fadeIn 0.3s ease\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between\">\n        <div style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:26px\">Professional Development</div>\n        <div onclick=\"{{ addPd }}\" style=\"padding:10px 18px;border-radius:10px;background:var(--accent);color:white;font-size:13px;font-weight:700;cursor:pointer\">+ Add PD</div>\n      </div>\n      <div class=\"tcp-pd-summary\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n        <div class=\"tcp-pd-total-card\" style=\"background:var(--bg-surface);border:1px solid var(--border);border-radius:16px;padding:24px;display:flex;flex-direction:column;justify-content:center\">\n          <div style=\"font-family:Nunito,sans-serif;font-weight:700;font-size:15px;margin-bottom:4px\">Total PD Hours</div>\n          <div class=\"tcp-pd-total-value\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:54px;line-height:1;color:var(--accent-dark);margin-top:12px\">{{ pdTotalHours }}</div>\n          <div class=\"tcp-pd-total-sub\" style=\"font-size:13px;color:var(--text-secondary);margin-top:10px\">{{ pdEntryCount }} activities logged</div>\n        </div>\n        <div class=\"tcp-pd-chart-card\" style=\"background:var(--bg-surface);border:1px solid var(--border);border-radius:16px;padding:24px\">\n          <div style=\"font-family:Nunito,sans-serif;font-weight:700;font-size:15px;margin-bottom:12px\">Hours by Category</div>\n          <canvas id=\"tcp-pd-chart\" width=\"620\" height=\"280\" style=\"height:240px;max-height:240px;width:100%\"></canvas>\n        </div>\n      </div>\n      <div class=\"tcp-pd-table\" style=\"background:var(--bg-surface);border:1px solid var(--border);border-radius:16px;overflow:hidden\">\n        <div class=\"tcp-pd-head\" style=\"display:grid;grid-template-columns:1fr 1.5fr 1fr 0.6fr 0.8fr;padding:12px 18px;background:var(--bg-raised);font-weight:600;font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border)\">\n          <div>Date</div><div>Activity</div><div>Provider</div><div>Hours</div><div>Category</div>\n        </div>\n        <sc-for list=\"{{ pdRows }}\" as=\"pr\">\n          <div class=\"tcp-pd-row\" style=\"display:grid;grid-template-columns:1fr 1.5fr 1fr 0.6fr 0.8fr auto;padding:12px 18px;border-bottom:1px solid var(--border);font-size:13px;align-items:center;gap:8px\">\n            <input type=\"date\" value=\"{{ pr.rawDate }}\" onchange=\"{{ pr.onDate }}\" style=\"padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-primary);font-size:12px\">\n            <input type=\"text\" value=\"{{ pr.activity }}\" oninput=\"{{ pr.onActivity }}\" style=\"padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-primary);font-size:12px\">\n            <input type=\"text\" value=\"{{ pr.provider }}\" oninput=\"{{ pr.onProvider }}\" style=\"padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-primary);font-size:12px\">\n            <input type=\"number\" value=\"{{ pr.hours }}\" onchange=\"{{ pr.onHours }}\" style=\"padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-primary);font-size:12px\">\n            <input type=\"text\" value=\"{{ pr.category }}\" oninput=\"{{ pr.onCategory }}\" style=\"padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-primary);font-size:12px\">\n            <div class=\"tcp-pd-delete\" onclick=\"{{ pr.remove }}\" style=\"color:var(--danger);font-size:12px;font-weight:800;cursor:pointer\">Delete</div>\n          </div>\n        </sc-for>\n      </div>\n    </div>\n\n    <!-- YEAR OVERVIEW -->\n    <div style=\"display:{{ yearD }};flex-direction:column;gap:20px;padding:32px;animation:fadeIn 0.3s ease\">\n      <div style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:26px\">Year Overview</div>\n      <!-- Term cards -->\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px\">\n        <sc-for list=\"{{ termCards }}\" as=\"tc\">\n          <div style=\"background:var(--bg-surface);border:1px solid var(--border);border-radius:16px;padding:20px\">\n            <div style=\"font-family:Nunito,sans-serif;font-weight:700;font-size:15px;margin-bottom:12px;color:var(--accent-dark)\">{{ tc.label }}</div>\n            <div style=\"display:flex;flex-direction:column;gap:8px;font-size:13px\">\n              <div style=\"display:flex;justify-content:space-between\"><span style=\"color:var(--text-secondary)\">Weeks</span><span style=\"font-weight:600\">{{ tc.weeks }}</span></div>\n              <div style=\"display:flex;justify-content:space-between\"><span style=\"color:var(--text-secondary)\">Lessons planned</span><span style=\"font-weight:600\">{{ tc.lessonsPlanned }}</span></div>\n              <div style=\"display:flex;justify-content:space-between\"><span style=\"color:var(--text-secondary)\">Lessons delivered</span><span style=\"font-weight:600\">{{ tc.lessonsDelivered }}</span></div>\n              <div style=\"display:flex;justify-content:space-between\"><span style=\"color:var(--text-secondary)\">Assessments</span><span style=\"font-weight:600\">{{ tc.assessments }}</span></div>\n            </div>\n          </div>\n        </sc-for>\n      </div>\n      <!-- Scores by subject and term -->\n      <div style adeIn 0.3s ease\">\n      <div style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:26px\">Reports &amp; Export</div>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px\">\n        <sc-for list=\"{{ reportCards }}\" as=\"rc\">\n          <div style=\"background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"font-weight:700;font-size:14px\">{{ rc.name }}</div>\n            <div style=\"font-size:12px;color:var(--text-secondary);line-height:1.5\">{{ rc.desc }}</div>\n            <div onclick=\"{{ rc.onClick }}\" style=\"padding:8px 16px;border-radius:8px;background:var(--accent);color:white;font-weight:600;font-size:12px;cursor:pointer;text-align:center;margin-top:auto\" style-hover=\"background:var(--accent-dark)\">{{ rc.action }}</div>\n          </div>\n        </sc-for>\n      </div>\n    </div>\n\n    <!-- INSTRUCTIONS -->\n    <div style=\"display:{{ instructionsD }};flex-direction:column;gap:20px;padding:32px;animation:fadeIn 0.3s ease;max-width:800px\">\n      <div style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:26px\">Instructions</div>\n      <sc-for list=\"{{ instructionSections }}\" as=\"ins\">\n        <div style=\"background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px\">\n          <div style=\"font-family:Nunito,sans-serif;font-weight:700;font-size:15px;margin-bottom:10px\">{{ ins.title }}</div>\n          <div style=\"font-size:13px;color:var(--text-secondary);line-height:1.8;white-space:pre-line\">{{ ins.content }}</div>\n        </div>\n      </sc-for>\n    </div>\n\n    <!-- SETTINGS -->\n    <div style=\"display:{{ settingsD }};flex-direction:column;gap:20px;padding:32px;animation:fadeIn 0.3s ease;max-width:900px\">\n      <div style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:26px\">Settings</div>\n      <!-- Pro      <div onclick=\"{{ saveLesson }}\" style=\"padding:8px 14px;border-radius:8px;background:var(--accent);color:white;font-weight:600;font-size:12px;cursor:pointer\">Save Lesson</div>\n          </div>\n        </div>\n      </sc-if>\n      <!-- Add Resource Modal -->\n      <sc-if value=\"{{ modalIsResource }}\">\n        <div style=\"display:flex;flex-direction:column;gap:14px\">\n          <div><div style=\"font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px\">TITLE</div>\n            <input type=\"text\" style=\"width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-primary);font-size:13px;outline:none\" value=\"{{ modalResTitle }}\" oninput=\"{{ onModalResTitle }}\">\n          </div>\n          <div><div style=\"font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px\">URL</div>\n            <input type=\"text\" style=\"width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-primary);font-size:13px;outline:none\" value=\"{{ modalResUrl }}\" oninput=\"{{ onModalResUrl }}\">\n          </div>\n          <div><div style=\"font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px\">TYPE</div>\n            <select style=\"padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-primary);font-size:13px\" value=\"{{ modalResType }}\" onchange=\"{{ onModalResType }}\">\n              <option value=\"Website\">Website</option><option value=\"PDF\">PDF</option><option value=\"Video\">Video</option><option value=\"Article\">Article</option><option value=\"Template\">Template</option>\n            </select>\n          </div>\n          <div><div style=\"font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px\">NOTES</div>\n            <textarea style=\"width:100%;height:60px;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;background:var(--bg-raised);color:var(--text-primary);resize:vertical;outline:none\" value=\"{{ modalResNotes }}\" oninput=\"{{ onModalResNotes }}\"></textarea>\n          </div>\n          <div onclick=\"{{ saveResource }}\" style=\"padding:10px 20px;border-radius:10px;background:var(--accent);color:white;font-weight:600;font-size:13px;cursor:pointer;text-align:center\" style-hover=\"background:var(--accent-dark)\">Save Resource</div>\n        </div>\n      </sc-if>\n    </div>\n  </div>\n</sc-if>\n\n</x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nclass Component extends DCLogic {\n  state = {\n    section: 'dashboard', theme: 'light', db: null,\n    weekOffset: 0, monthOffset: 0, attWeekOffset: 0, attClass: 'c1',\n    lessonClassFilter: '', lessonStatusFilter: '', lessonSearch: '', lessonLimit: 30,\n    studentSearch: '', studentClassFilter: '', studentFlagFilter: '',\n    activeClass: 'c1', classSubTab: 'roster',\n    gradeClass: 'c1',\n    currSubject: '',\n    adminTab: 'calendar',\n    resourceSearch: '', resourceType: '',\n    modal: null, modalData: {},\n    revealedPws: {},\n    sidebarCollapsed: false\n  };\n\n  componentDidMount() {\n    const saved = localStorage.getItem('tcp_v1');\n    let db;\n    if (saved) { try { db = JSON.parse(saved); } catch(e) {} }\n    if (!db && window.generateTCPDemo) db = window.generateTCPDemo();\n    if (!db) db = this.blankDb();\n    db = this.normalizeDb(db);\n    const theme = db.settings?.theme || 'light';\n    document.documentElement.className = theme === 'dark' ? 'dark' : '';\n    document.documentElement.setAttribute('data-palette', db.settings?.palette || 'coastal');\n    document.body.parentElement.className = theme === 'dark' ? 'dark' : '';\n    this.setState({ db, theme });\n  }\n\n  componentDidUpdate(_, prev) {\n    if (this.state.db && this.state.db !== prev?.db) {\n      clearTimeout(this._saveTimer);\n      this._saveTimer = setTimeout(() => {\n        try { localStorage.setItem('tcp_v1', JSON.stringify(this.state.db)); } catch(e) {}\n      }, 500);\n    }\n    // Charts\n    if (this.state.db) {\n      setTimeout(() => this.renderCharts(), 150);\n    }\n  }\n\n  updateDb(fn) {\n    this.setState(s => {\n      const db = JSON.parse(JSON.stringify(s.db));\n      fn(db);\n      return { db };\n    });\n  }\n\n  blankDb() {\n    return {\n      user:{name:'Teacher',school:'School',yearLabel:'2026'},\n      classes:[],students:[],lessons:[],assessments:[],grades:{},attendance:{},\n      timetable:{periods:6,days:['Mon','Tue','Wed','Thu','Fri'],duration:50,periodTimes:['08:45','09:40','10:35','11:45','12:40','13:35']},\n      timetableCells:{},terms:[],curriculum:[],resources:[],pd:[],contacts:[],events:[],passwords:[],budget:[],todos:[],\n      budgetAllocation:2000,safety:[],handover:{},quickNote:'',\n      settings:{theme:'light',palette:'coastal',dateFormat:'DD-MM-YYYY',gradeThresholds:{A:85,B:70,C:55,D:40},attendanceThreshold:85,backupPassword:''}\n    };\n  }\n\n  normalizeDb(db) {\n    const base = this.blankDb();\n    db = {...base, ...(db||{})};\n    db.user = {...base.user, ...(db.user||{})};\n    db.settings = {...base.settings, ...(db.settings||{})};\n    db.settings.gradeThresholds = {...base.settings.gradeThresholds, ...(db.settings.gradeThresholds||{})};\n    db.timetable = {...base.timetable, ...(db.timetable||{})};\n    db.timetable.periods = Math.max(1, Math.min(12, parseInt(db.timetable.periods)||6));\n    if (!Array.isArray(db.timetable.periodTimes)) db.timetable.periodTimes = [];\n    while (db.timetable.periodTimes.length < db.timetable.periods) db.timetable.periodTimes.push('');\n    if (!Array.isArray(db.terms)) db.terms = [];\n    db.terms = db.terms.slice().sort((a,b)=>(a.start||'').localeCompare(b.start||''));\n    ['classes','students','lessons','assessments','curriculum','resources','pd','contacts','events','passwords','budget','safety','todos'].forEach(k => {\n      if (!Array.isArray(db[k])) db[k] = [];\n    });\n    ['classes','students','lessons','assessments','curriculum','resources','pd','contacts','events','budget','safety','todos'].forEach(k => {\n      db[k] = db[k].map(item => this.repairRecordText(item));\n    });\n    db.todos = (db.todos || []).map(t => ({...t, completed: !!t.completed}));\n    if (db.todos.length === 0 && (db.user?.name || '') === 'Jordan Chen') {\n      const week = this.getWeekDates(0);\n      db.todos = [\n        {id:'todo_demo_lab',title:'Book lab equipment for Thursday practical',date:week[3],completed:false},\n        {id:'todo_demo_homework',title:'Follow up 9A Science homework returns',date:week[1],completed:false},\n        {id:'todo_demo_moderation',title:'Email Lisa re: SAC moderation meeting',date:week[2],completed:true},\n        {id:'todo_demo_parent',title:'Prepare notes for Year 9 parent check-in',date:week[4],completed:false}\n      ];\n    }\n    db.grades = db.grades || {};\n    db.attendance = db.attendance || {};\n    db.timetableCells = db.timetableCells || {};\n    db.handover = db.handover || {};\n    return db;\n  }\n\n  repairText(value) {\n    return String(value ?? '')\n      .replace(/\\u00e2\\u20ac[\\u201d\\u201c]/g, ' - ')\n      .replace(/\\u00e2\\u20ac\\u00a2/g, '*')\n      .replace(/\\u00c2\\u00b7/g, '-')\n      .replace(/â€”|â€“/g, ' - ')\n      .replace(/â€¢/g, '*')\n      .replace(/Â·/g, '-')\n      .replace(/\\s+-\\s+/g, ' - ')\n      .replace(/\\s+/g, ' ')\n      .trim();\n  }\n\n  repairRecordText(item) {\n    if (!item || typeof item !== 'object') return item;\n    const out = {...item};\n    Object.keys(out).forEach(k => {\n      if (typeof out[k] === 'string') out[k] = this.repairText(out[k]);\n    });\n    return out;\n  }\n\n  renderCharts() {\n    const s = this.state;\n    if (!s.db) return;\n    if (s.section === 'grades') this.renderGradeChart();\n    if (s.section === 'pd') this.renderPdChart();\n  }\n\n  renderGradeChart() {\n    const canvas = document.getElementById('tcp-grade-chart');\n    if (!canvas || !window.Chart) return;\n    if (this._gradeChart) this._gradeChart.destroy();\n    const db = this.state.db;\n    const t = db.settings?.gradeThresholds || {A:85,B:70,C:55,D:40};\n    const classAssessments = db.assessments.filter(a => a.classId === this.state.gradeClass);\n    const students = db.students.filter(st => st.classIds.includes(this.state.gradeClass));\n    let buckets = {A:0,B:0,C:0,D:0,F:0};\n    students.forEach(st => {\n      let total=0,max=0;\n      classAssessments.forEach(a => {\n        const g = db.grades[a.id+'-'+st.id];\n        if (g !== undefined) { total += g; max += a.maxMarks; }\n      });\n      const pct = max > 0 ? (total/max)*100 : 0;\n      if (pct >= t.A) buckets.A++; else if (pct >= t.B) buckets.B++; else if (pct >= t.C) buckets.C++; else if (pct >= t.D) buckets.D++; else buckets.F++;\n    });\n    const isDark = this.state.theme === 'dark';\n    this._gradeChart = new Chart(canvas, {\n      type: 'bar',\n      data: { labels: ['A','B','C','D','F'], datasets: [{ data: [buckets.A,buckets.B,buckets.C,buckets.D,buckets.F], backgroundColor: ['#7CC4A4','#6BBFB5','#F0C87A','#E8A0A8','#E88A8A'], borderRadius: 6 }] },\n      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{display:false},ticks:{color:isDark?'#B5ACA6':'#7A6F6A'}},y:{beginAtZero:true,grid:{color:isDark?'#3D3530':'#E4DFDA'},ticks:{color:isDark?'#B5ACA6':'#7A6F6A'}}} }\n    });\n  }\n\n  renderPdChart() {\n    const canvas = document.getElementById('tcp-pd-chart');\n    if (!canvas || !window.Chart) return;\n    if (this._pdChart) this._pdChart.destroy();\n    const db = this.state.db;\n    const cats = {};\n    (db.pd||[]).forEach(p => { cats[p.category] = (cats[p.category]||0) + p.hours; });\n    let labels = Object.keys(cats);\n    let data = Object.values(cats);\n    if (!labels.length) { labels = ['No PD logged']; data = [1]; }\n    const colors = ['#A8D8D0','#F2B8BF','#C5B8E8','#F5C9A0','#A8CDE8','#B8D4B0','#F0E0A0','#E8A8B8'];\n    const isDark = this.state.theme === 'dark';\n    this._pdChart = new Chart(canvas, {\n      type: 'doughnut',\n      data: { labels, datasets: [{ data, backgroundColor: colors.slice(0, labels.length), borderWidth: 2, borderColor: isDark ? '#2D2520' : '#fff', hoverOffset: 0 }] },\n      options: {\n        responsive:true, maintainAspectRatio:false, animation:false, resizeDelay:0,\n        circumference: 360, rotation: -90, cutout: '48%', radius: '90%',\n        layout:{padding:{top:8,right:8,bottom:8,left:8}},\n        plugins:{legend:{position:'bottom',labels:{color:isDark?'#B5ACA6':'#7A6F6A',font:{size:11},padding:8,boxWidth:22}}}\n      }\n    });\n  }\n\n  parseLocalDate(iso) {\n    if (!iso) return new Date();\n    const [y,m,d] = String(iso).slice(0,10).split('-').map(Number);\n    return new Date(y || new Date().getFullYear(), (m || 1) - 1, d || 1);\n  }\n\n  localISO(date) {\n    const y = date.getFullYear();\n    const m = String(date.getMonth() + 1).padStart(2, '0');\n    const d = String(date.getDate()).padStart(2, '0');\n    return `${y}-${m}-${d}`;\n  }\n\n  todayISO() {\n    return this.localISO(new Date());\n  }\n\n  formatDate(d) {\n    if (!d) return '';\n    const dt = this.parseLocalDate(d);\n    const fmt = this.state.db?.settings?.dateFormat || 'DD-MM-YYYY';\n    if (fmt === 'MM-DD-YYYY') return dt.toLocaleDateString('en-US', { month:'2-digit', day:'2-digit', year:'numeric' });\n    return dt.toLocaleDateString('en-AU', { day:'2-digit', month:'2-digit', year:'numeric' });\n  }\n\n  getWeekDates(offset) {\n    const now = new Date();\n    const dayOfWeek = now.getDay();\n    const monday = new Date(now);\n    monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1) + offset * 7);\n    const dates = [];\n    for (let i = 0; i < 5; i++) {\n      const d = new Date(monday);\n      d.setDate(monday.getDate() + i);\n      dates.push(this.localISO(d));\n    }\n    return dates;\n  }\n\n  cleanExportText(value) {\n    return this.repairText(value);\n  }\n\n  exportCSV(filename, headers, rows) {\n    const csv = '\\uFEFF' + [headers.map(h=>this.cleanExportText(h)).join(','), ...rows.map(r => r.map(c => '\"'+this.cleanExportText(c).replace(/\"/g,'\"\"')+'\"').join(','))].join('\\n');\n    const blob = new Blob([csv], {type:'text/csv'});\n    const a = document.createElement('a');\n    a.href = URL.createObjectURL(blob);\n    a.download = filename;\n    a.click();\n  }\n\n  exportJSONBackup() {\n    const json = JSON.stringify(this.state.db, null, 2);\n    const blob = new Blob([json], {type:'application/json'});\n    const a = document.createElement('a');\n    const d = this.todayISO();\n    a.href = URL.createObjectURL(blob);\n    a.download = 'tcp-backup-'+d+'.json';\n    a.click();\n  }\n\n  async deriveKey(password, salt) {\n    const enc = new TextEncoder();\n    const material = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);\n    return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:150000, hash:'SHA-256'}, material, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);\n  }\n\n  async exportEncryptedBackup() {\n    const password = this.state.db?.settings?.backupPassword || prompt('Enter an AES-256 backup password');\n    if (!password) return alert('Set a backup password first.');\n    const salt = crypto.getRandomValues(new Uint8Array(16));\n    const iv = crypto.getRandomValues(new Uint8Array(12));\n    const key = await this.deriveKey(password, salt);\n    const payload = new TextEncoder().encode(JSON.stringify(this.state.db));\n    const cipher = new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, payload));\n    const pack = {version:1, alg:'AES-GCM-256', kdf:'PBKDF2-SHA256', iterations:150000, salt:Array.from(salt), iv:Array.from(iv), data:Array.from(cipher)};\n    const blob = new Blob([JSON.stringify(pack)], {type:'application/json'});\n    const a = document.createElement('a');\n    a.href = URL.createObjectURL(blob);\n    a.download = 'tcp-encrypted-backup-'+this.todayISO()+'.tcpenc';\n    a.click();\n  }\n\n  importJSONBackup() {\n    const input = document.createElement('input');\n    input.type = 'file';\n    input.accept = '.json,.tcpenc,application/json';\n    input.onchange = async () => {\n      const file = input.files && input.files[0];\n      if (!file) return;\n      try {\n        let text = await file.text();\n        let data = JSON.parse(text);\n        if (data && data.alg === 'AES-GCM-256') {\n          const password = this.state.db?.settings?.backupPassword || prompt('Enter the backup password');\n          if (!password) return;\n          const key = await this.deriveKey(password, new Uint8Array(data.salt));\n          const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:new Uint8Array(data.iv)}, key, new Uint8Array(data.data));\n          data = JSON.parse(new TextDecoder().decode(plain));\n        }\n        if (!data || !confirm('Import this backup and replace current planner data?')) return;\n        const db = this.normalizeDb(data);\n        localStorage.setItem('tcp_v1', JSON.stringify(db));\n        document.documentElement.className = db.settings.theme === 'dark' ? 'dark' : '';\n        this.setState({db, theme:db.settings.theme || 'light'});\n      } catch (e) {\n        alert('Import failed. Check the file and password.');\n      }\n    };\n    input.click();\n  }\n\n  escapeHtml(value) {\n    return String(value ?? '').replace(/[&<>\"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[ch]));\n  }\n\n  printTimetableReport() {\n    const v = this.renderVals();\n    const esc = (value) => this.escapeHtml(value);\n    const weekRows = (v.ttRows || []).map(row => `\n      <div class=\"week-row\">\n        <div class=\"period\"><strong>${esc(row.period)}</strong><span>${esc(row.time)}</span></div>\n        ${(row.cells || []).map(cell => `\n          <div class=\"lesson-cell\" style=\"border-left-color:${cell.borderColor || 'transparent'};background:${cell.bg || 'transparent'}\">\n            <div class=\"lesson-title\">${esc(cell.className)}</div>\n            <div class=\"lesson-room\">${esc(cell.room)}</div>\n          </div>\n        `).join('')}\n      </div>\n    `).join('');\n    const monthCells = (v.monthDays || []).map(day => `\n      <div class=\"month-cell\" style=\"background:${day.bg || '#fff'}\">\n        <div class=\"month-day\" style=\"color:${day.color || '#111'}\">${esc(day.day)}</div>\n        <div class=\"month-items\">\n          ${(day.items || []).map(item => `\n            <div class=\"month-item\" style=\"color:${item.color || '#111'};background:${item.bg || 'transparent'};border-left-color:${item.border || 'transparent'}\">${esc(item.text)}</div>\n          `).join('')}\n        </div>\n      </div>\n    `).join('');\n    const html = `<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<title>Weekly Lesson Plan</title>\n<style>\n  @page { size: A4 landscape; margin: 10mm; }\n  :root {\n    --bg-page:#F7F5F2; --bg-surface:#FFFFFF; --bg-raised:#F0EDE8;\n    --accent:#6BBFB5; --accent-dark:#4EA49A; --text-primary:#2D2926; --text-secondary:#7A6F6A; --text-muted:#B5ACA6;\n    --border:#E4DFDA; --warning:#F0C87A;\n  }\n  * { box-sizing: border-box; }\n  body { margin: 0; font-family: Inter, Arial, sans-serif; color: #111; background: #fff; }\n  .print-page { width: 100%; min-height: 0; page-break-after: always; break-after: page; overflow: visible; }\n  .print-page:last-child { page-break-after: auto; break-after: auto; }\n  .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 7px; }\n  h1 { font: 800 22px Nunito, Arial, sans-serif; margin: 0; }\n  .sub { font-size: 12px; color: #555; margin-top: 2px; }\n  .teacher { font-size: 12px; color: #555; text-align: right; line-height: 1.35; }\n  .week-table { border: 1px solid #d8d8d8; border-radius: 10p  => ({\n      name: st.name,\n      cells: attWeekDates.map(date => {\n        const key = st.id+'-'+date;\n        const val = (db.attendance||{})[key] || 'P';\n        const sym = attSymbols[val] || attSymbols.P;\n        if (val==='P') attSummary.present++; else if (val==='A') attSummary.absent++; else if (val==='L') attSummary.late++; else attSummary.excused++;\n        return {\n          value:val, symbol:sym.s, color:sym.c,\n          onChange:(e)=>this.updateDb(d => {\n            d.attendance[key] = e.target.value || 'P';\n          })\n        };\n      })\n    }));\n\n    // GRADES\n    const gradeClassAssessments = (db.assessments||[]).filter(a => a.classId === s.gradeClass);\n    const gradeStudents = (db.students||[]).filter(st => st.classIds.includes(s.gradeClass));\n    const gradeAssessmentEditors = gradeClassAssessments.map(a => ({\n      ...a, rawDate:a.date||'',\n      onName:(e)=>this.updateDb(d=>{const x=d.assessments.find(v=>v.id===a.id);if(x)x.name=e.target.value;}),\n      onDate:(e)=>this.updateDb(d=>{const x=d.assessments.find(v=>v.id===a.id);if(x)x.date=e.target.value;}),\n      onMax:(e)=>this.updateDb(d=>{const x=d.assessments.find(v=>v.id===a.id);if(x)x.maxMarks=parseFloat(e.target.value)||100;}),\n      onWeight:(e)=>this.updateDb(d=>{const x=d.assessments.find(v=>v.id===a.id);if(x)x.weight=parseFloat(e.target.value)||0;}),\n      remove:()=>this.updateDb(d=>{d.assessments=d.assessments.filter(x=>x.id!==a.id);Object.keys(d.grades||{}).forEach(k=>{if(k.startsWith(a.id+'-')) delete d.grades[k];});})\n    }));\n    const gradeHeaders = gradeClassAssessments.map(a => ({name:a.name || 'Assessment'}));\n    const gradeColTemplate = gradeClassAssessments.map(() => 'minmax(150px,1fr)').join(' ');\n    const t = db.settings?.gradeThresholds || {A:85,B:70,C:55,D:40};\n\n    let gradeTotal = 0, gradeCount = 0;\n    const gradeRows = gradeStudents.map(st => {\n      const marks = gradeClassAssessments.map(a => {\n        const g = (db.grades||{}) ata:{...st.modalData,type:e.target.value}})),\n      onModalResNotes:(e)=>this.setState(st=>({modalData:{...st.modalData,notes:e.target.value}})),\n      saveResource:()=>{\n        if(!md.title)return;\n        this.updateDb(d=>{\n          const item={id:md.id||('r_'+Date.now()),title:md.title,url:md.url,type:md.type,notes:md.notes,tags:md.tags||[],dateAdded:md.dateAdded||this.todayISO(),starred:!!md.starred};\n          const i=d.resources.findIndex(x=>x.id===item.id); if(i>=0)d.resources[i]=item; else d.resources.push(item);\n        });\n        this.setState({modal:null,modalData:{}});\n      }\n    };\n  }\n}\n\n<\/script>\n\n\n</body></html>\n"},"entry":"standalone/Teacher Command Centre Pro.dc"}
